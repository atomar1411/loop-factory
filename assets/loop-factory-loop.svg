<svg width="1100" height="360" viewBox="0 0 1100 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Loop Factory delivery loop</title>
  <desc id="desc">A human request becomes an issue, branch, implementation, review, verification, and pull request evidence.</desc>
  <rect width="1100" height="360" rx="24" fill="#F8FAFC"/>
  <rect x="30" y="30" width="1040" height="300" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="62" y="82" fill="#0F172A" font-size="30" font-weight="800">The loop</text>
    <text x="62" y="113" fill="#64748B" font-size="18" font-weight="500">Every step leaves reviewable state behind.</text>

    <g transform="translate(62,156)">
      <rect width="118" height="70" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="25" y="32" fill="#1E3A8A" font-size="17" font-weight="800">Request</text>
      <text x="22" y="54" fill="#1D4ED8" font-size="13" font-weight="700">normal text</text>
    </g>
    <g transform="translate(205,156)">
      <rect width="118" height="70" rx="14" fill="#E0F2FE" stroke="#7DD3FC"/>
      <text x="38" y="32" fill="#075985" font-size="17" font-weight="800">Issue</text>
      <text x="22" y="54" fill="#0369A1" font-size="13" font-weight="700">task packet</text>
    </g>
    <g transform="translate(348,156)">
      <rect width="118" height="70" rx="14" fill="#CCFBF1" stroke="#5EEAD4"/>
      <text x="30" y="32" fill="#115E59" font-size="17" font-weight="800">Branch</text>
      <text x="22" y="54" fill="#0F766E" font-size="13" font-weight="700">worktree</text>
    </g>
    <g transform="translate(491,156)">
      <rect width="118" height="70" rx="14" fill="#DCFCE7" stroke="#86EFAC"/>
      <text x="17" y="32" fill="#166534" font-size="17" font-weight="800">Implement</text>
      <text x="29" y="54" fill="#15803D" font-size="13" font-weight="700">scoped</text>
    </g>
    <g transform="translate(634,156)">
      <rect width="118" height="70" rx="14" fill="#FEF3C7" stroke="#FCD34D"/>
      <text x="30" y="32" fill="#92400E" font-size="17" font-weight="800">Review</text>
      <text x="25" y="54" fill="#B45309" font-size="13" font-weight="700">findings</text>
    </g>
    <g transform="translate(777,156)">
      <rect width="118" height="70" rx="14" fill="#FCE7F3" stroke="#F9A8D4"/>
      <text x="31" y="32" fill="#9D174D" font-size="17" font-weight="800">Verify</text>
      <text x="25" y="54" fill="#BE185D" font-size="13" font-weight="700">evidence</text>
    </g>
    <g transform="translate(920,156)">
      <rect width="118" height="70" rx="14" fill="#F1F5F9" stroke="#CBD5E1"/>
      <text x="43" y="32" fill="#334155" font-size="17" font-weight="800">PR</text>
      <text x="22" y="54" fill="#475569" font-size="13" font-weight="700">decision</text>
    </g>

    <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M184 191H199"/>
      <path d="M193 185L200 191L193 197"/>
      <path d="M327 191H342"/>
      <path d="M336 185L343 191L336 197"/>
      <path d="M470 191H485"/>
      <path d="M479 185L486 191L479 197"/>
      <path d="M613 191H628"/>
      <path d="M622 185L629 191L622 197"/>
      <path d="M756 191H771"/>
      <path d="M765 185L772 191L765 197"/>
      <path d="M899 191H914"/>
      <path d="M908 185L915 191L908 197"/>
    </g>

    <text x="62" y="286" fill="#334155" font-size="17" font-weight="700">Stop gates:</text>
    <text x="160" y="286" fill="#64748B" font-size="17" font-weight="500">product semantics, money, security, deployment, service boundaries, irreversible actions.</text>
  </g>
</svg>
